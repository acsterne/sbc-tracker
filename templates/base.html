<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SBC Tracker{% endblock %}</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e2e8f0;
            --muted: #8892a4;
            --accent: #6366f1;
            --accent-dim: #4338ca;
            --red: #ef4444;
            --orange: #f97316;
            --green: #22c55e;
            --yellow: #eab308;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Nav */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 32px;
            height: 52px;
        }
        .nav-brand {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .nav-brand span { color: var(--accent); }
        .nav-links { display: flex; gap: 24px; }
        .nav-links a {
            color: var(--muted);
            font-size: 13px;
            font-weight: 500;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text); text-decoration: none; }

        /* Layout */
        .container { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        .card-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .card-value {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Metric cards row */
        .metric-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        /* Table */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            text-align: left;
            padding: 10px 12px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            color: var(--muted);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }
        th a { color: var(--muted); }
        th a:hover { color: var(--text); text-decoration: none; }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .num { text-align: right; font-variant-numeric: tabular-nums; }

        /* SBC % color coding */
        .sbc-high { color: var(--red); font-weight: 600; }
        .sbc-med  { color: var(--orange); }
        .sbc-low  { color: var(--green); }

        /* Growth color coding */
        .growth-high { color: var(--green); font-weight: 600; }
        .growth-med  { color: var(--yellow); }
        .growth-low  { color: var(--muted); }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-sector {
            background: rgba(99,102,241,0.15);
            color: #818cf8;
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        select, input[type=text] {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        select:focus, input:focus { outline: 1px solid var(--accent); }

        /* Page header */
        .page-header { margin-bottom: 28px; }
        .page-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
        .page-header p { color: var(--muted); margin-top: 4px; font-size: 13px; }

        /* Sort arrow */
        .sort-asc::after  { content: " ↑"; color: var(--accent); }
        .sort-desc::after { content: " ↓"; color: var(--accent); }
    </style>
</head>
<body>
<nav>
    <div class="nav-brand">SBC<span>Tracker</span></div>
    <div class="nav-links">
        <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Leaderboard</a>
        <a href="/scatter" {% if request.path == '/scatter' %}class="active"{% endif %}>SBC vs Growth</a>
    </div>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
